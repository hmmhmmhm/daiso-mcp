name: External Smoke

on:
  schedule:
    # 한국시간 00:40 = UTC 15:40 (전날)
    - cron: '40 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-smoke:
    runs-on: ubuntu-latest
    name: ${{ matrix.suite }} smoke (${{ matrix.service }})
    concurrency:
      group: external-smoke-${{ github.ref }}-${{ matrix.suite }}-${{ matrix.service }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - suite: cli
            service: daiso
          - suite: cli
            service: gs25
          - suite: cli
            service: seveneleven
          - suite: cli
            service: emart24
          - suite: cli
            service: lottemart
          - suite: cli
            service: oliveyoung
          - suite: cli
            service: megabox
          - suite: cli
            service: lottecinema
          - suite: cli
            service: cgv
          - suite: mcp
            service: daiso
          - suite: mcp
            service: gs25
          - suite: mcp
            service: seveneleven
          - suite: mcp
            service: emart24
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run external smoke
        env:
          SMOKE_SUITE: ${{ matrix.suite }}
          SMOKE_SERVICE: ${{ matrix.service }}
        run: |
          write_summary() {
            SMOKE_STATUS="$1" node <<'NODE'
          const fs = require('node:fs');
          const output = fs.existsSync('external-smoke-output.txt')
            ? fs.readFileSync('external-smoke-output.txt', 'utf8')
            : '';
          const excerpt = output
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean)
            .slice(-8)
            .join(' | ')
            .slice(0, 1000);
          const failure =
            output
              .split(/\r?\n/)
              .map((line) => line.trim())
              .find((line) =>
                /(?:CLI smoke 실패|CLI smoke 검증 실패|MCP smoke 실패|HTTP \d{3}|error code: \d+)/.test(
                  line,
                ),
              ) || 'unknown';
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const summary = [
            `status=${process.env.SMOKE_STATUS || 'failed'}`,
            `suite=${process.env.SMOKE_SUITE}`,
            `service=${process.env.SMOKE_SERVICE}`,
            `failure=${failure.slice(0, 300)}`,
            `run=${runUrl}`,
            excerpt,
          ].filter(Boolean).join(' ');
          fs.writeFileSync('external-smoke-summary.txt', summary);
          console.log(summary);
          NODE
          }

          run_smoke() {
            if [ "${SMOKE_SUITE}" = "cli" ]; then
              npm run cli:smoke -- --service "${SMOKE_SERVICE}" 2>&1 | tee external-smoke-output.txt
              return "${PIPESTATUS[0]}"
            fi

            npm run mcp:smoke -- --service "${SMOKE_SERVICE}" 2>&1 | tee external-smoke-output.txt
            return "${PIPESTATUS[0]}"
          }

          if ! run_smoke; then
            if [ "${SMOKE_SUITE}" = "cli" ]; then
              echo "CLI smoke failed; retrying after 15 seconds"
            else
              echo "MCP smoke failed; retrying after 15 seconds"
            fi
            sleep 15
            if ! run_smoke; then
              write_summary "failed"
              exit 1
            fi
          fi

      - name: Notify smoke failure
        if: failure()
        env:
          MOSHI_WEBHOOK_TOKEN: ${{ secrets.MOSHI_WEBHOOK_TOKEN }}
        run: |
          if [ -z "${MOSHI_WEBHOOK_TOKEN}" ]; then
            echo "MOSHI_WEBHOOK_TOKEN is not set; skipping failure notification"
            exit 0
          fi

          SUMMARY="$(cat external-smoke-summary.txt 2>/dev/null || echo 'external smoke command failed')"
          curl -X POST https://api.getmoshi.app/api/webhook \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${MOSHI_WEBHOOK_TOKEN}\",\"title\":\"External Smoke Failed\",\"message\":\"${GITHUB_REPOSITORY}: ${SUMMARY}\"}"
