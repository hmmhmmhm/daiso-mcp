name: External Smoke

on:
  schedule:
    # 한국시간 00:40 = UTC 15:40 (전날)
    - cron: '40 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-smoke:
    runs-on: ubuntu-latest
    name: CLI and MCP external smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI smoke
        run: npm run cli:smoke

      - name: Run MCP smoke
        run: npm run mcp:smoke

      - name: Notify smoke failure
        if: failure()
        env:
          MOSHI_WEBHOOK_TOKEN: ${{ secrets.MOSHI_WEBHOOK_TOKEN }}
        run: |
          if [ -z "${MOSHI_WEBHOOK_TOKEN}" ]; then
            echo "MOSHI_WEBHOOK_TOKEN is not set; skipping failure notification"
            exit 0
          fi

          curl -X POST https://api.getmoshi.app/api/webhook \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${MOSHI_WEBHOOK_TOKEN}\",\"title\":\"External Smoke Failed\",\"message\":\"${GITHUB_REPOSITORY} ${GITHUB_WORKFLOW} failed on ${GITHUB_REF_NAME}: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
