name: External Smoke

on:
  schedule:
    # 한국시간 00:40 = UTC 15:40 (전날)
    - cron: '40 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-smoke:
    runs-on: ubuntu-latest
    name: CLI and MCP external smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI smoke
        run: npm run cli:smoke

      - name: Run MCP smoke
        run: npm run mcp:smoke
