name: Sync Worker Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-worker-secrets:
    runs-on: ubuntu-latest
    name: Sync Worker secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync configured Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
          HEALTH_CHECK_SECRET: ${{ secrets.HEALTH_CHECK_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          put_secret_if_set() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "Skipping ${name}: GitHub secret is not set"
              return 0
            fi

            echo "$value" | npx wrangler secret put "$name"
          }

          put_secret_if_set ZYTE_API_KEY "$ZYTE_API_KEY"
          put_secret_if_set GOOGLE_MAPS_API_KEY "$GOOGLE_MAPS_API_KEY"
          put_secret_if_set NAVER_CLIENT_ID "$NAVER_CLIENT_ID"
          put_secret_if_set NAVER_CLIENT_SECRET "$NAVER_CLIENT_SECRET"
          put_secret_if_set OPINET_API_KEY "$OPINET_API_KEY"
          put_secret_if_set HEALTH_CHECK_SECRET "$HEALTH_CHECK_SECRET"
          put_secret_if_set SUPABASE_URL "$SUPABASE_URL"
          put_secret_if_set SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
